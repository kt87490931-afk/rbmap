name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploy start ==="
            if [ ! -d /var/www/rbmap/.git ]; then
              rm -rf /var/www/rbmap
              git clone git@github.com:${{ github.repository }}.git /var/www/rbmap
            fi
            cd /var/www/rbmap
            git fetch origin
            git reset --hard origin/main
            echo "=== Git OK: $(git rev-parse --short HEAD) ==="

            echo "=== npm ci ==="
            npm ci || { echo "npm ci FAILED"; exit 1; }
            echo "=== npm run build ==="
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build || { echo "npm run build FAILED"; exit 1; }

            cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
            [ -d public ] && cp -r public .next/standalone/public 2>/dev/null || true
            if [ -f .env.production ]; then
              cp .env.production .next/standalone/.env.production
            elif [ -f .env.local ]; then
              cp .env.local .next/standalone/.env.production
            fi
            [ -f gemini_api_key.env ] && cp gemini_api_key.env .next/standalone/gemini_api_key.env || true

            mkdir -p logs
            if pm2 describe rbmap > /dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs
            else
              pm2 start ecosystem.config.cjs
              pm2 save
            fi
            pm2 status rbmap

            # Cron: 리뷰 6시간 자동생성 (KST 0,6,12,18시 = UTC 15,21,3,9시)
            chmod +x /var/www/rbmap/scripts/cron-generate-reviews.sh 2>/dev/null || true
            if ! crontab -l 2>/dev/null | grep -q "cron-generate-reviews"; then
              (crontab -l 2>/dev/null; echo "0 3,9,15,21 * * * /var/www/rbmap/scripts/cron-generate-reviews.sh") | crontab -
              echo "Cron 추가됨: 리뷰 생성 (KST 0,6,12,18시)"
            else
              # 기존 크론 업데이트 (UTC서버→KST 0,6,12,18 맞춤)
              crontab -l 2>/dev/null | sed '/cron-generate-reviews/s|0 0,6,12,18|0 3,9,15,21|' | crontab -
              echo "Cron 스케줄 업데이트: KST 0,6,12,18시"
            fi

            # Cron: 일일 리포트 (매일 00시 KST)
            chmod +x /var/www/rbmap/scripts/cron-daily-report.sh 2>/dev/null || true
            if ! crontab -l 2>/dev/null | grep -q "cron-daily-report"; then
              (crontab -l 2>/dev/null; echo "0 0 * * * /var/www/rbmap/scripts/cron-daily-report.sh") | crontab -
              echo "Cron 추가됨: 일일 리포트 (00시)"
            fi

            # Cron: 구글 사이트맵 Ping (매일 06시 KST)
            chmod +x /var/www/rbmap/scripts/cron-sitemap-ping.sh 2>/dev/null || true
            if ! crontab -l 2>/dev/null | grep -q "cron-sitemap-ping"; then
              (crontab -l 2>/dev/null; echo "0 21 * * * /var/www/rbmap/scripts/cron-sitemap-ping.sh") | crontab -
              echo "Cron 추가됨: 사이트맵 Ping (KST 06시)"
            fi
