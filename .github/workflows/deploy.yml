name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            if [ ! -d /var/www/rbmap/.git ]; then
              rm -rf /var/www/rbmap
              git clone git@github.com:${{ github.repository }}.git /var/www/rbmap
            fi
            cd /var/www/rbmap
            git fetch origin
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart rbmap || pm2 start npm --name "rbmap" -- start
            pm2 save
