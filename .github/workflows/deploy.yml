name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploy start ==="
            if [ ! -d /var/www/rbmap/.git ]; then
              rm -rf /var/www/rbmap
              git clone git@github.com:${{ github.repository }}.git /var/www/rbmap
            fi
            cd /var/www/rbmap
            git fetch origin
            git reset --hard origin/main
            echo "=== Git OK: $(git rev-parse --short HEAD) ==="

            echo "=== Clean node_modules/.next (fix Next.js jest-worker MODULE_NOT_FOUND) ==="
            rm -rf node_modules .next

            echo "=== npm ci ==="
            npm ci || { echo "npm ci FAILED"; exit 1; }
            echo "=== npm run build ==="
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build || { echo "npm run build FAILED"; exit 1; }

            cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
            [ -d public ] && cp -r public .next/standalone/public 2>/dev/null || true
            if [ -f .env.production ]; then
              cp .env.production .next/standalone/.env.production
            elif [ -f .env.local ]; then
              cp .env.local .next/standalone/.env.production
            fi
            [ -f gemini_api_key.env ] && cp gemini_api_key.env .next/standalone/gemini_api_key.env || true

            mkdir -p logs
            if pm2 describe rbmap > /dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs
            else
              pm2 start ecosystem.config.cjs
              pm2 save
            fi
            pm2 status rbmap

            # Cron: 리뷰 생성 20분마다 (0,20,40분)
            chmod +x /var/www/rbmap/scripts/cron-generate-reviews.sh 2>/dev/null || true
            CRON_CURRENT=$(crontab -l 2>/dev/null || true)
            if echo "$CRON_CURRENT" | grep -q "cron-generate-reviews.sh"; then
              if ! echo "$CRON_CURRENT" | grep -q "0,20,40.*cron-generate-reviews.sh"; then
                CRON_CURRENT=$(echo "$CRON_CURRENT" | grep -v "cron-generate-reviews.sh" | grep -v "^# rbmap 리뷰 자동생성" || true)
                ( echo "$CRON_CURRENT"; echo "# rbmap 리뷰 자동생성 (20분마다)"; echo "0,20,40 * * * * /var/www/rbmap/scripts/cron-generate-reviews.sh" ) | crontab -
                echo "Cron 스케줄 갱신: 20분마다 (0,20,40)"
              else
                echo "Cron 이미 20분마다 설정됨"
              fi
            else
              ( echo "$CRON_CURRENT"; echo "# rbmap 리뷰 자동생성 (20분마다)"; echo "0,20,40 * * * * /var/www/rbmap/scripts/cron-generate-reviews.sh" ) | crontab -
              echo "Cron 추가됨: 리뷰 생성 20분마다 (0,20,40)"
            fi

            # Cron: 일일 리포트 (매일 00시 KST)
            chmod +x /var/www/rbmap/scripts/cron-daily-report.sh 2>/dev/null || true
            if ! crontab -l 2>/dev/null | grep -q "cron-daily-report"; then
              (crontab -l 2>/dev/null; echo "0 0 * * * /var/www/rbmap/scripts/cron-daily-report.sh") | crontab -
              echo "Cron 추가됨: 일일 리포트 (00시)"
            fi

            # Cron: Cloudflare 봇 로그 동기화 (10분마다)
            chmod +x /var/www/rbmap/scripts/cron-cloudflare-bot-sync.sh 2>/dev/null || true
            CRON_CURRENT_BOT=$(crontab -l 2>/dev/null || true)
            if echo "$CRON_CURRENT_BOT" | grep -q "cron-cloudflare-bot-sync.sh"; then
              if ! echo "$CRON_CURRENT_BOT" | grep -q "\\*/10 \\* \\* \\* \\* .*cron-cloudflare-bot-sync.sh"; then
                CRON_CURRENT_BOT=$(echo "$CRON_CURRENT_BOT" | grep -v "cron-cloudflare-bot-sync.sh" || true)
                ( echo "$CRON_CURRENT_BOT"; echo "*/10 * * * * /var/www/rbmap/scripts/cron-cloudflare-bot-sync.sh" ) | crontab -
                echo "Cron 스케줄 갱신: Cloudflare 봇 로그 동기화 10분마다"
              else
                echo "Cron 이미 10분마다 설정됨: Cloudflare 봇 로그 동기화"
              fi
            else
              ( echo "$CRON_CURRENT_BOT"; echo "*/10 * * * * /var/www/rbmap/scripts/cron-cloudflare-bot-sync.sh" ) | crontab -
              echo "Cron 추가됨: Cloudflare 봇 로그 동기화 10분마다"
            fi

            # Cron: 구글 사이트맵 Ping (매일 06시 KST)
            chmod +x /var/www/rbmap/scripts/cron-sitemap-ping.sh 2>/dev/null || true
            if ! crontab -l 2>/dev/null | grep -q "cron-sitemap-ping"; then
              (crontab -l 2>/dev/null; echo "0 21 * * * /var/www/rbmap/scripts/cron-sitemap-ping.sh") | crontab -
              echo "Cron 추가됨: 사이트맵 Ping (KST 06시)"
            fi
