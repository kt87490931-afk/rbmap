name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploy start ==="
            if [ ! -d /var/www/rbmap/.git ]; then
              rm -rf /var/www/rbmap
              git clone git@github.com:${{ github.repository }}.git /var/www/rbmap
            fi
            cd /var/www/rbmap
            git fetch origin
            git reset --hard origin/main
            echo "=== Git OK: $(git rev-parse --short HEAD) ==="

            echo "=== npm ci ==="
            npm ci || { echo "npm ci FAILED"; exit 1; }
            echo "=== npm run build ==="
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build || { echo "npm run build FAILED"; exit 1; }

            cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
            [ -d public ] && cp -r public .next/standalone/public 2>/dev/null || true
            if [ -f .env.production ]; then
              cp .env.production .next/standalone/.env.production
            elif [ -f .env.local ]; then
              cp .env.local .next/standalone/.env.production
            fi
            [ -f gemini_api_key.env ] && cp gemini_api_key.env .next/standalone/gemini_api_key.env || true

            mkdir -p logs
            if pm2 describe rbmap > /dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs
            else
              pm2 start ecosystem.config.cjs
              pm2 save
            fi
            pm2 status rbmap
