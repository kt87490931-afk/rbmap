.rb-slice {
  line-height: 0;
  font-size: 0;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  overflow-x: hidden;
  box-sizing: border-box;
}
.rb-slice *,
.rb-slice *::before,
.rb-slice *::after {
  box-sizing: border-box;
}
.rb-slice img {
  display: block;
  width: 100%;
  max-width: 100%;
  height: auto;
  margin: 0;
  padding: 0;
  border: 0;
  vertical-align: top;
  -webkit-tap-highlight-color: transparent;
}
.rb-slice a {
  display: block;
  line-height: 0;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: rgba(0, 0, 0, 0.08);
}
</style>

<script>
(function () {
  var trackPath = "/p/threeno-swtest";
  var root = document.querySelector(".rb-slice");
  if (!root) return;
  root.addEventListener(
    "click",
    function (e) {
      var a = e.target && e.target.closest && e.target.closest("a[href^='tel:']");
      if (!a) return;
      fetch("/api/track/click", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "call", path: trackPath }),
      }).catch(function () {});
    },
    { passive: true }
  );
})();
</script>
